<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Segitiga Emas IKSASS</title>
  <desc id="desc">Simulasi Segitiga Emas IKSASS yang menghubungkan Pesantren, Alumni, dan Masyarakat dalam satu poros perjuangan dan pengabdian.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b5a33"/>
      <stop offset="55%" stop-color="#0f6b3d"/>
      <stop offset="100%" stop-color="#5b8f2f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4d77b"/>
      <stop offset="100%" stop-color="#c79d2e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6fbf7"/>
      <stop offset="100%" stop-color="#e8f3ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0a3f24" flood-opacity="0.28"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 56px 'Arial', 'Helvetica Neue', sans-serif; fill: #ffffff; }
      .subtitle { font: 600 24px 'Arial', 'Helvetica Neue', sans-serif; fill: #d8ead8; }
      .nodeTitle { font: 700 34px 'Arial', 'Helvetica Neue', sans-serif; fill: #0f6b3d; }
      .nodeText { font: 400 22px 'Arial', 'Helvetica Neue', sans-serif; fill: #405244; }
      .coreTitle { font: 700 34px 'Arial', 'Helvetica Neue', sans-serif; fill: #ffffff; }
      .coreText { font: 500 20px 'Arial', 'Helvetica Neue', sans-serif; fill: #e7f6eb; }
      .label { font: 700 24px 'Arial', 'Helvetica Neue', sans-serif; fill: #7d6117; letter-spacing: 2px; }
      .micro { font: 600 18px 'Arial', 'Helvetica Neue', sans-serif; fill: #f7f3e8; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)" rx="34"/>
  <circle cx="180" cy="170" r="260" fill="#ffffff" opacity="0.05"/>
  <circle cx="1430" cy="250" r="320" fill="#ffffff" opacity="0.06"/>
  <circle cx="820" cy="840" r="280" fill="#ffffff" opacity="0.04"/>

  <text x="800" y="110" text-anchor="middle" class="title">Simulasi Segitiga Emas IKSASS</text>
  <text x="800" y="154" text-anchor="middle" class="subtitle">Menjaga sanad nilai pesantren, menggerakkan potensi alumni, dan menyalurkan khidmah untuk kemaslahatan masyarakat.</text>

  <path d="M 800 250 L 390 690 L 1210 690 Z" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M 800 250 L 390 690" stroke="#fff7d8" stroke-opacity="0.8" stroke-width="2"/>
  <path d="M 800 250 L 1210 690" stroke="#fff7d8" stroke-opacity="0.8" stroke-width="2"/>
  <path d="M 390 690 L 1210 690" stroke="#fff7d8" stroke-opacity="0.8" stroke-width="2"/>

  <g transform="translate(660 360)" filter="url(#shadow)">
    <circle cx="140" cy="140" r="140" fill="#0d5d35"/>
    <circle cx="140" cy="140" r="116" fill="#157947" stroke="#f1d067" stroke-width="8"/>
    <circle cx="140" cy="140" r="84" fill="#0f6b3d" stroke="#ffffff" stroke-width="10"/>
    <text x="140" y="116" text-anchor="middle" class="coreTitle">IKSASS</text>
    <text x="140" y="150" text-anchor="middle" class="coreText">Nilai • Kader</text>
    <text x="140" y="182" text-anchor="middle" class="coreText">Jejaring • Khidmah</text>
    <text x="140" y="245" text-anchor="middle" class="label">POROS PERJUANGAN</text>
  </g>

  <g transform="translate(585 196)">
    <rect x="0" y="0" width="430" height="176" rx="26" fill="url(#panel)" stroke="#dfe9df" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="52" cy="52" r="28" fill="#edbd33"/>
    <path d="M38 63 h28 l-6 -20 -8 8 -8 -8z" fill="#fff7d7"/>
    <text x="215" y="54" text-anchor="middle" class="nodeTitle">Pesantren</text>
    <text x="215" y="96" text-anchor="middle" class="nodeText">Produksi SDM santri yang khoiru ummah,</text>
    <text x="215" y="128" text-anchor="middle" class="nodeText">berbasis ilmu, adab, sanad, dan khidmah.</text>
  </g>

  <g transform="translate(120 626)">
    <rect x="0" y="0" width="470" height="196" rx="28" fill="url(#panel)" stroke="#dfe9df" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="56" cy="58" r="28" fill="#6b64f2"/>
    <path d="M40 72 q16 -28 32 0" fill="none" stroke="#f7f8ff" stroke-width="6" stroke-linecap="round"/>
    <text x="235" y="58" text-anchor="middle" class="nodeTitle">Alumni</text>
    <text x="235" y="98" text-anchor="middle" class="nodeText">Pemetaan dan penguatan potensi,</text>
    <text x="235" y="128" text-anchor="middle" class="nodeText">pengembangan jejaring, promosi,</text>
    <text x="235" y="158" text-anchor="middle" class="nodeText">serta distribusi kader di ruang strategis.</text>
  </g>

  <g transform="translate(1010 626)">
    <rect x="0" y="0" width="470" height="196" rx="28" fill="url(#panel)" stroke="#dfe9df" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="56" cy="58" r="28" fill="#6edb8a"/>
    <path d="M38 70 h36" stroke="#f5fff7" stroke-width="6" stroke-linecap="round"/>
    <path d="M56 52 v36" stroke="#f5fff7" stroke-width="6" stroke-linecap="round"/>
    <text x="235" y="58" text-anchor="middle" class="nodeTitle">Masyarakat</text>
    <text x="235" y="98" text-anchor="middle" class="nodeText">Ladang pengabdian, perjuangan kader,</text>
    <text x="235" y="128" text-anchor="middle" class="nodeText">dan penyaluran manfaat sosial, keagamaan,</text>
    <text x="235" y="158" text-anchor="middle" class="nodeText">pendidikan, dan ekonomi secara nyata.</text>
  </g>

  <g transform="translate(640 825)">
    <rect x="0" y="0" width="320" height="86" rx="18" fill="#ffffff" fill-opacity="0.16" stroke="#fff0c8" stroke-opacity="0.7"/>
    <text x="160" y="35" text-anchor="middle" class="micro">Segitiga ini menegaskan satu alur:</text>
    <text x="160" y="62" text-anchor="middle" class="micro">Pesantren menanamkan nilai, alumni menggerakkan, masyarakat menerima manfaat.</text>
  </g>
</svg>
